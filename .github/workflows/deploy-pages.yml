name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Let in-flight production deployments finish; only queued runs are superseded.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # No VITE_BASE_PATH: the site is served at the root of the custom domain
    # (mgrains.mpump.live), so assets must be root-relative. A base of /mgrains/
    # would 404 every asset and render a blank page. dist/CNAME (from public/CNAME)
    # keeps the custom domain attached across Actions deploys.
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          # Enable Pages and set its source to GitHub Actions on first run, so the
          # deploy job is not blocked by an unconfigured ("Deploy from a branch") site.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
